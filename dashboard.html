<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e1116">
<title>Steady — Dashboard</title>
<style>
  :root{ --bg:#0e1116; --panel:#161b22; --panel2:#1f2630; --line:#2a313c; --text:#e8edf3; --dim:#9aa6b2; --accent:#6ea8fe; --accent2:#a78bfa; }
  *{box-sizing:border-box;}
  html,body{margin:0; min-height:100%;}
  body{background:var(--bg); color:var(--text); font:16px/1.5 -apple-system,BlinkMacSystemFont,system-ui,sans-serif; -webkit-text-size-adjust:100%;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
  .wrap{max-width:560px; margin:0 auto; padding:16px 16px 100px; position:relative;}
  h1{font-size:26px; margin:2px 0 4px;}
  .sub{color:var(--dim); font-size:13px; margin-bottom:18px;}

  .menu-btn{position:absolute; top:14px; right:16px; z-index:5; width:42px; height:42px; border-radius:11px; background:var(--panel2); border:1px solid var(--line); color:var(--text); font-size:19px; cursor:pointer;}
  .menu-overlay{position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.5);}
  .menu-card{position:absolute; top:12px; right:12px; min-width:210px; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:6px; box-shadow:0 14px 36px rgba(0,0,0,.5);}
  .menu-card h3{margin:8px 12px; font-size:11px; letter-spacing:.07em; text-transform:uppercase; color:var(--dim);}
  .menu-item{display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:9px; color:var(--text); text-decoration:none; font-size:15px;}
  .menu-item:active{background:var(--panel2);}
  .menu-item.current{color:var(--accent); font-weight:600;}
  .menu-item .mi-ic{width:22px; text-align:center; font-size:17px;}

  .tiles{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .tile{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:15px 16px;}
  .tile .val{font-size:25px; font-weight:700; font-variant-numeric:tabular-nums; line-height:1.1;}
  .tile .lbl{color:var(--dim); font-size:12px; margin-top:5px;}

  .card{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:16px; margin-top:16px;}
  .cardhead{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:6px;}
  .cardhead h2{font-size:15px; margin:0;}
  .cardhead .tot{color:var(--dim); font-size:12px;}
  .seg{display:flex; gap:3px; background:var(--panel2); border-radius:9px; padding:3px;}
  .seg button{border:none; background:none; color:var(--dim); padding:6px 9px; border-radius:7px; font-size:11.5px; cursor:pointer;}
  .seg button.on{background:var(--accent); color:#0b1220; font-weight:600;}

  .chart{display:flex; align-items:flex-end; gap:4px; height:140px; margin-top:14px;}
  .bar-wrap{flex:1; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; height:100%;}
  .bar{width:100%; max-width:26px; background:linear-gradient(180deg,var(--accent),#3f6fd1); border-radius:4px 4px 0 0; min-height:0;}
  .bar.z{background:var(--panel2); height:3px !important; min-height:3px;}
  .axis{display:flex; gap:4px; margin-top:6px;}
  .axis span{flex:1; text-align:center; font-size:10px; color:var(--dim); overflow:hidden; white-space:nowrap;}

  .brow{display:flex; align-items:center; gap:12px; margin:12px 0;}
  .bcover{width:34px; height:50px; border-radius:4px; object-fit:cover; background:var(--panel2); flex:0 0 auto;}
  .binfo{flex:1; min-width:0;}
  .btitle{font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .hbar{height:6px; background:var(--panel2); border-radius:3px; overflow:hidden; margin-top:6px;}
  .hfill{height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:3px;}
  .bmeta{font-size:11.5px; color:var(--dim); margin-top:4px; font-variant-numeric:tabular-nums;}

  .shelfrow{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:12px; text-align:center;}
  .shelfrow .s .n{font-size:24px; font-weight:700;}
  .shelfrow .s .l{font-size:11px; color:var(--dim); margin-top:2px;}

  .empty{color:var(--dim); font-size:13px; text-align:center; padding:24px 6px;}
  .muted{color:var(--dim); font-size:12px;}
</style>
</head>
<body>
<div class="wrap">
  <button id="menuBtn" class="menu-btn" aria-label="Menu">☰</button>
  <div id="menuOverlay" class="menu-overlay" hidden>
    <nav class="menu-card">
      <h3>Steady</h3>
      <a class="menu-item" href="index.html"><span class="mi-ic">🎧</span> Audiobook</a>
      <a class="menu-item" href="reader.html"><span class="mi-ic">📖</span> Reader</a>
      <a class="menu-item current" href="dashboard.html"><span class="mi-ic">📊</span> Dashboard</a>
    </nav>
  </div>

  <h1>Dashboard</h1>
  <div class="sub">Your listening &amp; reading at a glance.</div>

  <div id="dash"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---- data ---- */
function openDB(name){ return new Promise(res => { const r = indexedDB.open(name); r.onsuccess = () => res(r.result); r.onerror = () => res(null); r.onupgradeneeded = () => {}; }); }
function getAllKV(db, store){
  return new Promise(res => {
    if (!db || !db.objectStoreNames.contains(store)) return res([]);
    try {
      const tx = db.transaction(store, 'readonly'), os = tx.objectStore(store), vq = os.getAll(), kq = os.getAllKeys();
      tx.oncomplete = () => res((kq.result || []).map((k, i) => ({ key: k, value: vq.result[i] })));
      tx.onerror = () => res([]);
    } catch(e){ res([]); }
  });
}

/* ---- helpers ---- */
function fmtHM(sec){ sec = Math.round(sec||0); const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60); if (h) return h + 'h ' + m + 'm'; if (m) return m + 'm'; return sec + 's'; }
function fmtMS(sec){ sec = Math.round(sec||0); if (sec < 60) return sec + 's'; const m = Math.floor(sec/60), s = sec%60; return m + 'm ' + String(s).padStart(2,'0') + 's'; }
const DKEY = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
const dayNum = s => { const [y,mo,da] = s.split('-').map(Number); return Math.floor(Date.UTC(y, mo-1, da) / 86400000); };
const WD = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function computeStreaks(dayMap){
  const active = new Set(Object.keys(dayMap).filter(k => dayMap[k] > 0));
  if (!active.size) return { current: 0, longest: 0 };
  let d = new Date();
  if (!active.has(DKEY(d))) d.setDate(d.getDate() - 1);   // grace: today not done yet, count from yesterday
  let current = 0;
  while (active.has(DKEY(d))){ current++; d.setDate(d.getDate() - 1); }
  const nums = [...active].map(dayNum).sort((a,b) => a-b);
  let longest = 1, run = 1;
  for (let i = 1; i < nums.length; i++){ run = (nums[i] === nums[i-1] + 1) ? run + 1 : 1; longest = Math.max(longest, run); }
  return { current, longest };
}
function rangeSeries(dayMap, range){
  const now = new Date(), bars = [];
  if (range === 'year'){
    for (let i = 11; i >= 0; i--){
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const pre = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-';
      let sec = 0; for (const k in dayMap) if (k.startsWith(pre)) sec += dayMap[k];
      bars.push({ label: MO[d.getMonth()], sec });
    }
  } else {
    const days = range === 'month' ? 30 : 7;
    for (let i = days - 1; i >= 0; i--){
      const d = new Date(now); d.setDate(now.getDate() - i);
      bars.push({ label: days === 7 ? WD[d.getDay()] : (d.getDate() === 1 || i === days-1 ? MO[d.getMonth()]+' '+d.getDate() : ''), sec: dayMap[DKEY(d)] || 0 });
    }
  }
  return bars;
}

/* ---- render ---- */
let DAYMAP = {}, BOOKS = [];
function renderChart(range){
  const bars = rangeSeries(DAYMAP, range);
  const max = Math.max(1, ...bars.map(b => b.sec));
  const total = bars.reduce((a,b) => a + b.sec, 0);
  $('rangeTot').textContent = fmtHM(total);
  $('chart').innerHTML = bars.map(b =>
    `<div class="bar-wrap"><div class="bar${b.sec ? '' : ' z'}" style="height:${b.sec ? Math.max(4, b.sec/max*100) : 0}%" title="${fmtHM(b.sec)}"></div></div>`).join('');
  $('axis').innerHTML = bars.map(b => `<span>${esc(b.label)}</span>`).join('');
  document.querySelectorAll('#rangeSeg button').forEach(x => x.classList.toggle('on', x.dataset.r === range));
}

function render(dayMap, books, readerBooks){
  DAYMAP = dayMap; BOOKS = books;
  const dash = $('dash');
  const totalSec = Object.values(dayMap).reduce((a,b) => a + b, 0);
  const finished = books.filter(b => (b.timesFinished||0) > 0 || b.finishedAt).length;
  const { current, longest } = computeStreaks(dayMap);
  // this week (last 7 days)
  let week = 0; const now = new Date();
  for (let i = 0; i < 7; i++){ const d = new Date(now); d.setDate(now.getDate()-i); week += dayMap[DKEY(d)] || 0; }

  if (!totalSec && !books.length && !readerBooks.length){
    dash.innerHTML = '<div class="card"><div class="empty">No activity yet. Play an audiobook or open a book in the Reader and your stats will show up here.</div></div>';
    return;
  }

  // most-listened books (with real listening time)
  const listened = books.filter(b => (b.listenedSec||0) > 0).sort((a,b) => b.listenedSec - a.listenedSec).slice(0, 6);
  const maxListen = Math.max(1, ...listened.map(b => b.listenedSec));
  const bookRows = listened.map(b => {
    const dur = b.durationSec ? ' of ' + fmtHM(b.durationSec) : '';
    const done = ((b.timesFinished||0) > 0 || b.finishedAt) ? ' ✓' : '';
    return `<div class="brow"><div class="binfo"><div class="btitle">${esc(b.title||'Untitled')}${done}</div>`
      + `<div class="hbar"><div class="hfill" style="width:${(b.listenedSec/maxListen*100).toFixed(1)}%"></div></div>`
      + `<div class="bmeta">${fmtHM(b.listenedSec)} listened${dur}</div></div></div>`;
  }).join('');

  // reading shelves + reading-time stats
  const shelf = k => readerBooks.filter(b => b.shelf === k).length;
  const pagesRead = readerBooks.reduce((a, b) => a + ((b.pos && b.pos.page) || 0), 0);
  const readSecTotal = readerBooks.reduce((a, b) => a + (b.readSec || 0), 0);
  const avgPerPage = pagesRead > 0 ? readSecTotal / pagesRead : 0;
  const inProgress = readerBooks.filter(b => b.pos && b.pos.pages && b.shelf !== 'finished')
    .sort((a, b) => (b.pos.page / b.pos.pages) - (a.pos.page / a.pos.pages)).slice(0, 5);
  const readingRows = inProgress.map(b => {
    const pct = Math.max(0, Math.min(100, b.pos.page / b.pos.pages * 100));
    return `<div class="brow"><div class="binfo"><div class="btitle">${esc(b.title||'Untitled')}</div>`
      + `<div class="hbar"><div class="hfill" style="width:${pct.toFixed(1)}%"></div></div>`
      + `<div class="bmeta">${b.pos.page} / ${b.pos.pages} pages</div></div></div>`;
  }).join('');

  dash.innerHTML =
    `<div class="tiles">
       <div class="tile"><div class="val">${fmtHM(totalSec)}</div><div class="lbl">Total listened</div></div>
       <div class="tile"><div class="val">${current}${current===1?' day':' days'}</div><div class="lbl">Current streak${longest>current?` · best ${longest}`:''}</div></div>
       <div class="tile"><div class="val">${finished}</div><div class="lbl">Books finished</div></div>
       <div class="tile"><div class="val">${fmtHM(week)}</div><div class="lbl">This week</div></div>
     </div>

     <div class="card">
       <div class="cardhead"><h2>Listening</h2>
         <div class="seg" id="rangeSeg"><button data-r="week">Week</button><button data-r="month">Month</button><button data-r="year">Year</button></div>
       </div>
       <div class="muted"><span id="rangeTot"></span> in view</div>
       <div class="chart" id="chart"></div>
       <div class="axis" id="axis"></div>
     </div>

     ${listened.length ? `<div class="card"><div class="cardhead"><h2>Most listened</h2></div>${bookRows}</div>` : ''}

     <div class="card">
       <div class="cardhead"><h2>Reading</h2><span class="tot">${readerBooks.length} book${readerBooks.length===1?'':'s'}</span></div>
       <div class="shelfrow">
         <div class="s"><div class="n">${pagesRead.toLocaleString()}</div><div class="l">Pages read</div></div>
         <div class="s"><div class="n">${fmtHM(readSecTotal)}</div><div class="l">Time reading</div></div>
         <div class="s"><div class="n">${avgPerPage ? fmtMS(avgPerPage) : '—'}</div><div class="l">Avg / page</div></div>
       </div>
       <div class="shelfrow" style="margin-top:14px;">
         <div class="s"><div class="n">${shelf('tbr')}</div><div class="l">To read</div></div>
         <div class="s"><div class="n">${shelf('reading')}</div><div class="l">Reading</div></div>
         <div class="s"><div class="n">${shelf('finished')}</div><div class="l">Finished</div></div>
       </div>
       ${readingRows ? `<div style="margin-top:16px;"><div class="muted" style="margin-bottom:2px;">Currently reading</div>${readingRows}</div>` : ''}
     </div>`;

  document.querySelectorAll('#rangeSeg button').forEach(b => b.onclick = () => renderChart(b.dataset.r));
  renderChart('week');
}

/* ---- boot ---- */
(async () => {
  const sdb = await openDB('steady-db');
  const rdb = await openDB('steady-reader-db');
  const stats = await getAllKV(sdb, 'stats');
  const readerBooks = (await getAllKV(rdb, 'books')).map(e => e.value).filter(Boolean);
  const dayMap = {}, books = [];
  for (const e of stats){
    if (typeof e.key === 'string' && e.key.startsWith('d:')) dayMap[e.key.slice(2)] = (e.value && e.value.sec) || 0;
    else if (typeof e.key === 'string' && e.key.startsWith('b:') && e.value) books.push(e.value);
  }
  render(dayMap, books, readerBooks);
})();

// nav menu
(function(){
  const btn = $('menuBtn'), ov = $('menuOverlay');
  if (!btn || !ov) return;
  btn.addEventListener('click', () => { ov.hidden = false; });
  ov.addEventListener('click', e => { if (e.target === ov) ov.hidden = true; });
  ov.querySelectorAll('.menu-item.current').forEach(a => a.addEventListener('click', e => { e.preventDefault(); ov.hidden = true; }));
})();
if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
</script>
</body>
</html>
